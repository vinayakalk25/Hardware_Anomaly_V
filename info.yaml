--- 
# Tiny Tapeout project information
project:
  title:        "Hardware Anomaly Detector"
  author:       "VINAYAKA LK"
  discord:      ""
  description:  "A systolic array neural network pipeline for V2X cyber attack detection."
  language:     "Verilog"
  clock_hz:     50000000       # 50 MHz clock speed (20ns period)

  # How many tiles your design occupies. A single tile is about 160x100 uM.
