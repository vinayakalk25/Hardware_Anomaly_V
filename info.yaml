    # Note: If you have other .v files (like systolic_array_core.v), list them below!
    # - "feature_extractor.v"
    # - "systolic_array_core.v"

# The pinout of your project. Leave unused pins blank ("")
pinout:
  # Inputs
  ui[0]: "bit_in (Serial data stream)"
  ui[1]: "bit_valid (Data valid flag)"
  ui[2]: "mode_sel (Operation mode)"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "final_score[0]"
  uo[1]: "final_score[1]"
  uo[2]: "final_score[2]"
  uo[3]: "final_score[3]"
  uo[4]: "final_score[4]"
  uo[5]: "final_score[5]"
  uo[6]: "final_score[6]"
  uo[7]: "final_score[7]"

  # Bidirectional (Configured as outputs for this project)
  uio[0]: "done_pulse"
  uio[1]: "irq (Cyber Attack Alarm)"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

